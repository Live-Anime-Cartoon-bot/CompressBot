<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
    <title>Premium Player Area</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:sans-serif; }
        body { background:#0b0b0d; color:#fff; display:flex; flex-direction:column; height:100vh; overflow:hidden; }
        
        .player-container { position:relative; width:100%; aspect-ratio:16/9; background:#000; }
        video { width:100%; height:100%; object-fit:contain; }
        
        .player-header { position:absolute; top:12px; left:12px; display:flex; align-items:center; gap:12px; z-index:10; background:rgba(0,0,0,0.6); padding:6px 14px; border-radius:20px; }
        .back-arrow { color:#fff; text-decoration:none; }

        .middle-bar { background:#141419; padding:10px 12px; border-bottom:1px solid #23232a; display:flex; flex-direction:column; gap:6px; }
        .status-tag { background:#11241d; color:#00e676; border:1px solid #163a2b; padding:4px 12px; border-radius:20px; font-weight:bold; font-size:12px; width:fit-content; }

        .list-section { flex:1; overflow-y:auto; padding:12px; }
        .list-grid { display:grid; grid-template-columns:repeat(2, 1fr); gap:12px; }
        
        .list-card { background:#141419; border-radius:12px; overflow:hidden; border:1px solid #23232a; cursor:pointer; display:flex; flex-direction:column; }
        .list-card.active { border-color:#00e676; background:#191922; }
        
        .card-thumb { position:relative; aspect-ratio:16/9; background:#1f1f26; display:flex; align-items:center; justify-content:center; }
        .card-thumb img { width:100%; height:100%; object-fit:contain; padding:6px; }
        .card-live { position:absolute; top:6px; left:6px; background:#ff1744; color:#fff; font-size:9px; font-weight:bold; padding:2px 5px; border-radius:4px; }
        .card-watchers { position:absolute; bottom:6px; left:6px; background:rgba(0,0,0,0.7); color:#fff; font-size:10px; padding:2px 6px; border-radius:4px; }

        .card-details { padding:10px; display:flex; align-items:center; gap:8px; }
        .card-avatar { width:32px; height:32px; background:#252530; border-radius:50%; overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:bold; flex-shrink:0; }
        .card-avatar img { width:100%; height:100%; object-fit:cover; }
        .card-title { font-size:12px; font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    </style>
</head>
<body>

    <div class="player-container">
        <div class="player-header">
            <a href="index.html" class="back-arrow"><i class="fa-solid fa-arrow-left"></i></a>
            <span style="font-size:13px; font-weight:bold;" id="nowPlaying">LOADING...</span>
        </div>
        <video id="videoPlayer" controls autoplay playsinline></video>
    </div>

    <div class="middle-bar">
        <div class="status-tag"><i class="fa-solid fa-circle-check"></i> Link 0 - Active</div>
    </div>

    <div class="list-section">
        <div class="list-grid" id="playlistGrid"></div>
    </div>

    <script>
        const m3uPlaylistUrl = "playlist.m3u";
        let hlsInstance = null;
        const videoEl = document.getElementById('videoPlayer');
        const params = new URLSearchParams(window.location.search);
        const startUrl = params.get('stream');
        const startName = params.get('name');

        function getRandomViewers() {
            return (Math.random() * (75 - 12) + 12).toFixed(1) + "K";
        }

        async function initPlayer() {
            try {
                const res = await fetch(m3uPlaylistUrl);
                const text = await res.text();
                const lines = text.split('\n');
                let list = [];
                let obj = {};

                for (let i = 0; i < lines.length; i++) {
                    let line = lines[i].trim();
                    if (line.startsWith('#EXTINF:')) {
                        let name = line.match(/,(.+)$/) ? line.match(/,(.+)$/)[1] : "Live Channel";
                        let logo = line.match(/tvg-logo="([^"]+)"/) ? line.match(/tvg-logo="([^"]+)"/)[1] : "";
                        obj = { name, logo, viewers: getRandomViewers() };
                    } else if (line.startsWith('http')) {
                        obj.url = line;
                        list.push(obj);
                        obj = {};
                    }
                }
                setupGrid(list);
            } catch (err) { console.error(err); }
        }

        function setupGrid(channels) {
            const grid = document.getElementById('playlistGrid');
            grid.innerHTML = "";

            channels.forEach((ch, idx) => {
                let cleanName = ch.name.replace("24/7 ", "").split('|')[0].trim();
                let isPlaying = (startUrl && ch.url === startUrl) || (!startUrl && idx === 0);

                const item = document.createElement('div');
                item.className = `list-card ${isPlaying ? 'active' : ''}`;
                item.innerHTML = `
                    <div class="card-thumb">
                        <span class="card-live">LIVE</span>
                        <span class="card-watchers"><i class="fa-solid fa-users"></i> ${ch.viewers}</span>
                        ${ch.logo ? `<img src="${ch.logo}">` : `<div style="font-size:20px;">📺</div>`}
                    </div>
                    <div class="card-details">
                        <div class="card-avatar">
                            ${ch.logo ? `<img src="${ch.logo}">` : `<span>${cleanName.charAt(0)}</span>`}
                        </div>
                        <div style="flex:1; overflow:hidden;">
                            <div class="card-title">${cleanName}</div>
                        </div>
                    </div>
                `;

                item.onclick = () => {
                    document.querySelectorAll('.list-card').forEach(el => el.classList.remove('active'));
                    item.classList.add('active');
                    runStream(ch.url, ch.name);
                };
                grid.appendChild(item);
            });

            if (startUrl) { runStream(startUrl, startName); } 
            else if (channels.length > 0) { runStream(channels[0].url, channels[0].name); }
        }

        function runStream(url, name) {
            document.getElementById('nowPlaying').innerText = name.replace("24/7 ", "").split('|')[0].trim().toUpperCase();
            
            // CORS बाईपास प्रॉक्सी जो स्ट्रीम को ब्लॉक होने से रोकती है
            const finalUrl = "https://cors-anywhere.herokuapp.com/" + url;

            if (Hls.isSupported()) {
                if (hlsInstance) { hlsInstance.destroy(); }
                hlsInstance = new Hls();
                hlsInstance.loadSource(finalUrl);
                hlsInstance.attachMedia(videoEl);
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => { videoEl.play(); });
            } else if (videoEl.canPlayType('application/vnd.apple.mpegurl')) {
                videoEl.src = finalUrl;
                videoEl.addEventListener('loadedmetadata', () => { videoEl.play(); });
            }
        }

        initPlayer();
    </script>
</body>
</html>

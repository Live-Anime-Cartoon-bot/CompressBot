<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
    <title>Anime Cartoon Live Tv</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #0b0b0d; color: #fff; padding: 20px; }
        h2 { font-size: 22px; margin-bottom: 20px; font-weight: 600; letter-spacing: -0.5px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
        @media(min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        .card { background: #141419; border-radius: 14px; overflow: hidden; border: 1px solid #23232a; cursor: pointer; transition: transform 0.2s; }
        .card:hover { transform: translateY(-2px); border-color: #ff1744; }
        .thumb-box { position: relative; aspect-ratio: 16/9; background: #1f1f26; display: flex; align-items: center; justify-content: center; }
        .thumb-box img { width: 100%; height: 100%; object-fit: contain; padding: 10px; }
        .live-badge { position: absolute; top: 10px; left: 10px; background: #ff1744; color: #fff; font-size: 10px; font-weight: bold; padding: 3px 8px; border-radius: 6px; }
        .info { padding: 12px; text-align: center; }
        .title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body>

    <h2>Live Cartoon Channels</h2>
    <div class="grid" id="homeGrid"></div>

    <script>
        // यह आपकी गिटहब की म्यूट फाइल को ऑटोमैटिक रीड करेगा
        const m3uPlaylist = "playlist.m3u";

        async function initHome() {
            try {
                const res = await fetch(m3uPlaylist);
                const text = await res.text();
                const lines = text.split('\n');
                let channels = [];
                let current = {};

                for(let i=0; i<lines.length; i++) {
                    let line = lines[i].trim();
                    if(line.startsWith('#EXTINF:')) {
                        let name = line.match(/,(.+)$/) ? line.match(/,(.+)$/)[1] : "Live Channel";
                        let logo = line.match(/tvg-logo="([^"]+)"/) ? line.match(/tvg-logo="([^"]+)"/)[1] : "";
                        current = { name, logo };
                    } else if(line.startsWith('http')) {
                        current.url = line;
                        channels.push(current);
                        current = {};
                    }
                }

                const container = document.getElementById('homeGrid');
                channels.forEach(ch => {
                    let cleanName = ch.name.replace("24/7 ", "").split('|')[0].trim();
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="thumb-box">
                            <span class="live-badge">● LIVE</span>
                            ${ch.logo ? `<img src="${ch.logo}">` : `<div style="font-size:24px;color:#555;">📺</div>`}
                        </div>
                        <div class="info">
                            <div class="title">${cleanName}</div>
                        </div>
                    `;
                    card.onclick = () => {
                        window.location.href = `player.html?stream=${encodeURIComponent(ch.url)}&name=${encodeURIComponent(ch.name)}`;
                    };
                    container.appendChild(card);
                });
            } catch(e) { console.error(e); }
        }
        initHome();
    </script>
</body>
</html>
